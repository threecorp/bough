name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Go test + lint + nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          diagnostic-endpoint: ''
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix flake check
        run: nix flake check --no-build --show-trace

      - name: go vet + test
        run: nix develop .#ci -c go test ./... -race

      - name: golangci-lint
        run: nix develop .#ci -c golangci-lint run ./...

      - name: build smoke
        run: nix develop .#ci -c make build

      - name: actionlint
        run: nix develop .#ci -c actionlint

  conformance:
    name: Plugin conformance (real Docker)
    needs: test
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
        plugin: [mysql, postgres, redis, elasticsearch]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          diagnostic-endpoint: ''
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Raise vm.max_map_count (elasticsearch only)
        if: ${{ matrix.plugin == 'elasticsearch' }}
        # Elasticsearch refuses to leave the bootstrap-check phase
        # when vm.max_map_count < 262144, which is the GHA runner
        # default of 65530. Without this nudge the container starts,
        # logs `max virtual memory areas vm.max_map_count [65530] is
        # too low`, and never accepts TCP — ReadyCheck then burns the
        # entire ReadyTimeout window. Docker Desktop on macOS hides
        # this because the daemon VM already sets a higher value.
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Pre-pull container images
        run: |
          # alpine is the chown helper image the conformance suite spins
          # up to recover from container-uid-owned datadir files (see
          # conformance/datadir.go); pull it alongside the engine image
          # so the test's cleanup path is not what stalls the runner.
          docker pull alpine:3.20
          case "${{ matrix.plugin }}" in
            mysql)         docker pull mysql:8.4 ;;
            postgres)      docker pull postgres:17 ;;
            redis)         docker pull redis:7 ;;
            elasticsearch) docker pull docker.elastic.co/elasticsearch/elasticsearch:7.17.29 ;;
          esac

      - name: Build plugin binary
        run: |
          mkdir -p bin
          nix develop .#ci -c go build \
            -o bin/bough-plugin-${{ matrix.plugin }} \
            ./cmd/bough-plugin-${{ matrix.plugin }}

      - name: Run conformance suite
        env:
          BOUGH_CONFORMANCE_PLUGIN_BIN: ${{ github.workspace }}/bin/bough-plugin-${{ matrix.plugin }}
        run: |
          nix develop .#ci -c go test -tags=conformance -race -timeout=15m -v \
            ./plugins/engine/${{ matrix.plugin }}/...

      - name: Diagnostic — dump bough container logs (on failure)
        if: failure()
        run: |
          echo "=== docker ps -a ==="
          docker ps -a
          echo ""
          for c in $(docker ps -aq --filter name=bough-); do
            echo "=== inspect $c ==="
            docker inspect "$c" --format '{{.Name}} {{.State.Status}} ExitCode={{.State.ExitCode}} Error={{.State.Error}} OOMKilled={{.State.OOMKilled}}'
            echo "=== logs --tail 200 $c ==="
            docker logs --tail 200 "$c" 2>&1 || true
          done

  memory-conformance:
    # v0.5 instinct subsystem: round 3 AI #3 made it explicit that
    # memory backends should run in a separate matrix from engine
    # backends so SQLite WAL / concurrency contention does not pile
    # onto engine docker pre-pull. The SQLite plugin (modernc.org/sqlite
    # pure Go) needs neither nix nor docker.
    name: Memory plugin conformance
    needs: test
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
        plugin: [sqlite]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          diagnostic-endpoint: ''
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build memory plugin binary
        run: |
          mkdir -p bin
          nix develop .#ci -c go build \
            -o bin/bough-plugin-memory-${{ matrix.plugin }} \
            ./cmd/bough-plugin-memory-${{ matrix.plugin }}

      - name: Run memory conformance suite
        env:
          BOUGH_CONFORMANCE_MEMORY_PLUGIN_BIN: ${{ github.workspace }}/bin/bough-plugin-memory-${{ matrix.plugin }}
        run: |
          nix develop .#ci -c go test -tags=conformance -race -timeout=10m -v \
            ./plugins/memory/${{ matrix.plugin }}/...

  memory-macos-smoke:
    # macOS smoke for the SQLite reference-fallback. The release matrix
    # ships darwin/amd64 + darwin/arm64, so at least running the
    # unit-test layer on macOS catches platform-specific regressions
    # (modernc.org/sqlite's darwin shim, PRAGMA behaviour) before we
    # tag.
    name: Memory plugin macOS smoke
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: go test ./plugins/memory/sqlite/...
        run: go test -race ./plugins/memory/sqlite/...
