// memory.proto is the v0.5.0 contract between the bough host and any
// `bough-plugin-memory-<name>` binary that persists, queries, and
// audits per-worktree instinct state. Plugins implement MemoryBackend
// over Hashicorp go-plugin's gRPC transport.
//
// bough does NOT own memory intelligence. The SQLite reference-
// fallback backend ships in v0.5 only as the minimum protocol-
// verification implementation; production deployments are expected to
// configure mem0 / Graphiti / Letta via separate community / official
// plugins (v0.6+). See docs/EXTERNAL_MEMORY_BACKENDS.md.
//
// Versioning: bumping ProtocolVersion in plugins/memory/api/handshake.go
// is what gates a backwards-incompatible change here. Add new fields
// with new tag numbers, do not renumber existing ones. v0.6 will add
// optional features (semantic query, graph query, vector search)
// negotiated through the Capabilities() RPC — plugins should reply
// `false` for any feature they have not implemented rather than
// erroring at Query time.

syntax = "proto3";

package bough.memory.v1;

option go_package = "github.com/ikeikeikeike/bough/plugins/memory/api/proto;pb";

import "google/protobuf/empty.proto";

// MemoryBackend persists and retrieves the instincts produced by the
// host's InstinctMinter pipeline. The backend is intentionally NOT
// asked to mint, compile, or evaluate — those belong to other
// interfaces (InstinctMinter / CapabilityCompiler / SkillEvaluator).
service MemoryBackend {
  // Health is a lightweight liveness probe used during pluginhost
  // discovery and conformance lifecycle. Plugins should answer in
  // under ~50ms with their backend kind and reachability state.
  rpc Health(HealthRequest) returns (HealthResponse);

  // Capabilities lets a plugin advertise its optional feature support
  // (vector search, graph query, semantic query, bulk export, ...).
  // The host uses this to decide whether to route a given Query to
  // the plugin or to fall back to FTS. v0.5 plugins should return all
  // optional features as `false`.
  rpc Capabilities(google.protobuf.Empty) returns (CapabilitiesResponse);

  // Store persists or upserts a single Instinct. The host treats
  // Store as a true upsert: if an item with the same ID (or matching
  // DedupeKey within the same scope) already exists, the backend
  // increments hits, updates confidence according to source policy,
  // and refreshes last_hit_at. Stdin-ingest and JSONL-tail observers
  // can both retry-fire the same SourceEventID; the backend must
  // dedupe on (DedupeKey, SourceEventID) to keep CI retries and JSONL
  // re-reads idempotent.
  rpc Store(StoreRequest) returns (StoreResponse);

  // Query searches the backend for instincts matching Term within
  // Scope, bounded by both MaxResults (count cap) and MaxTokens
  // (estimated-token cap). The backend MUST honor both caps and set
  // Truncated=true on each Result that was elided. EstimatedTokens
  // lets the host's budget aggregator stop iterating once the
  // running total exceeds the configured retrieve.max_tokens.
  rpc Query(QueryRequest) returns (QueryResponse);

  // Forget is a soft delete: the backend marks the instinct's State
  // as "forgotten" but keeps the row for audit. Hard deletion is the
  // responsibility of the coordinator's decay scheduler, not the
  // backend.
  rpc Forget(ForgetRequest) returns (ForgetResponse);

  // Export streams the backend's instincts out in the requested
  // format. v0.5 supports "yaml" and "jsonl"; v0.6+ adds
  // "claude-skills", "agent-skill", and "mcp".
  rpc Export(ExportRequest) returns (ExportResponse);

  // Import re-hydrates instincts from a previously Exported payload.
  // The backend should treat Import as a batch of upserts (same
  // dedupe semantics as Store).
  rpc Import(ImportRequest) returns (ImportResponse);
}

// Scope addresses one of three lifetime tiers. WorktreeID is set only
// for Level="worktree"; RepoName is set for Level="repo" and
// Level="global". The host's promote.go controller is what moves an
// instinct between tiers — backends never invent or change scope.
message Scope {
  string level = 1;        // "worktree" | "repo" | "global"
  string worktree_id = 2;
  string repo_name = 3;
}

// Instinct is the active row carried by the backend. The fields
// mirror pkg/schema/Instinct (CapabilityArtifact stays out of memory
// land — it is a compiled artifact owned by CapabilityCompiler).
message Instinct {
  string id = 1;
  string rule = 2;
  string why = 3;
  string how_to_apply = 4;
  repeated string domain = 5;
  Scope scope = 6;
  string source = 7;       // explicit_user_feedback | test_failure | session_summary | llm_only | ...
  double confidence = 8;
  string state = 9;        // candidate | active | archived | forgotten
  int32 hits = 10;
  int64 last_hit_at = 11;  // unix epoch seconds
  int64 created_at = 12;
  repeated string source_traces = 13;
  repeated string evidence_refs = 14;
  string dedupe_key = 15;  // sha256(normalize(rule + scope))
  // metadata holds plugin-defined JSON (mcp resource_template,
  // skill frontmatter, ...). v0.5 SQLite reserves the column so
  // v0.6 plugins can populate it without a schema migration.
  string metadata_json = 16;
}

message HealthRequest {}
message HealthResponse {
  string error = 1;
  string backend_kind = 2;     // "sqlite" | "mem0" | "graphiti" | ...
  string plugin_version = 3;
}

message CapabilitiesResponse {
  bool semantic_query = 1;     // dense vector + reranker (v0.6+)
  bool graph_query = 2;        // entity / relation query (v0.6+)
  bool bulk_export = 3;        // streaming export (v0.6+)
  bool vector_search = 4;      // pure ANN backend (v0.6+)
  bool supports_metadata = 5;  // honors Instinct.metadata_json
  string plugin_version = 6;
}

message StoreRequest {
  Instinct instinct = 1;
  string dedupe_key = 2;        // sha256(normalize(rule + scope)); host may pre-compute
  string source_event_id = 3;   // CI / JSONL tail / retry idempotency token
  bool upsert_semantics = 4;    // true: existing ID → hits++ / confidence reinforce
}
message StoreResponse {
  string error = 1;
  string stored_id = 2;
  bool was_upsert = 3;          // true if existing row updated, false if new row inserted
}

message QueryRequest {
  string term = 1;
  Scope scope = 2;
  int32 max_results = 3;        // host-imposed hard limit (validator default 12)
  int32 max_tokens = 4;         // host-imposed hard limit (validator default 4000)
  double min_confidence = 5;
}
message QueryResult {
  Instinct instinct = 1;
  double score = 2;
  int32 estimated_tokens = 3;   // backend's best estimate; host aggregates
  bool truncated = 4;           // true if max_tokens cap elided content
}
message QueryResponse {
  string error = 1;
  repeated QueryResult results = 2;
}

message ForgetRequest {
  string id = 1;
  Scope scope = 2;
  string reason = 3;
}
message ForgetResponse {
  string error = 1;
}

message ExportRequest {
  string format = 1;            // "yaml" | "jsonl"  (v0.6: + "claude-skills" / "agent-skill" / "mcp")
  Scope scope = 2;              // empty Level = all scopes
  string state_filter = 3;      // "" = all; otherwise "active" | "candidate" | ...
}
message ExportResponse {
  string error = 1;
  bytes payload = 2;
  string content_type = 3;
}

message ImportRequest {
  string format = 1;
  bytes payload = 2;
  bool overwrite_existing = 3;
}
message ImportResponse {
  string error = 1;
  int32 imported_count = 2;
  int32 upserted_count = 3;
  int32 skipped_count = 4;
}
