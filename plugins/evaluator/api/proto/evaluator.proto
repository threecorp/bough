// evaluator.proto freezes the v0.5.0 wire contract for
// `bough-plugin-evaluator-<name>` plugins WITHOUT shipping a working
// implementation. v0.5 only generates the gRPC stubs and the Go
// interface; the host's `bough capability evaluate` CLI and the first
// official evaluators (GEPA reflective prompt optimiser, TextGrad
// gradient evaluator, MUSE-Autoskill lifecycle evaluator, SkillAudit
// paired-trajectory auditor) land in v0.7+.
//
// Why split this from CapabilityCompiler: compilation and evaluation
// are different concerns. A compiler turns approved instincts into
// candidate artifacts; an evaluator decides whether a given artifact
// should survive (be promoted), be revised, or be pruned. The bough
// vision treats evaluator-driven evolution (utility scoring, auto-
// pruning, paired-trajectory auditing) as the v0.7+ layer that sits
// above v0.6's compiler layer. Keeping the interfaces separate means
// a v0.7 evaluator can score artifacts produced by any v0.6 compiler
// without the compiler having to expose an evaluate hook.
//
// Versioning: bumping ProtocolVersion in plugins/evaluator/api/handshake.go
// is what gates a backwards-incompatible change here. Recommendation
// fields may grow over time (e.g., a recommended next experiment
// when ShouldPrune is false), but the wire shape stays stable.

syntax = "proto3";

package bough.evaluator.v1;

option go_package = "github.com/ikeikeikeike/bough/plugins/evaluator/api/proto;pb";

import "bough/capability/v1/capability.proto";

// SkillEvaluator scores a single CapabilityArtifact and recommends
// whether the host should promote, revise, or prune it. Evaluators
// are stateless from the host's point of view; if an evaluator needs
// historical context (paired-trajectory comparisons, prior
// confidence trajectory) it must fetch that from its own backing
// store, not from bough's memory.
service SkillEvaluator {
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
}

// EvaluationOutcome is the evaluator's coarse-grained verdict. Fine-
// grained signals (utility breakdown, regression evidence) live on
// EvaluateResponse fields below; OUTCOME is the routing decision the
// host's coordinator uses.
enum EvaluationOutcome {
  OUTCOME_UNSPECIFIED = 0;
  OUTCOME_PROMOTE     = 1;
  OUTCOME_KEEP        = 2;
  OUTCOME_REVISE      = 3;
  OUTCOME_PRUNE       = 4;
}

message EvaluateRequest {
  bough.capability.v1.CapabilityArtifact artifact = 1;
  bytes evaluator_context_json = 2;  // free-form plugin-defined inputs
}

message EvaluateResponse {
  string error = 1;
  EvaluationOutcome outcome = 2;
  double utility = 3;                 // [0.0, 1.0], evaluator's confidence
  double confidence_delta = 4;        // suggested confidence adjustment
  bool should_prune = 5;              // OUTCOME_PRUNE convenience flag
  repeated string evidence_refs = 6;
  string explanation = 7;             // human-readable reasoning
  bytes evaluator_payload_json = 8;   // free-form plugin-defined output
}
