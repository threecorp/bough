// instinct.proto is the v0.5.0 contract between the bough host and any
// `bough-plugin-instinct-<name>` binary that mints InstinctCandidates
// from raw TraceBundles. The bough core ships a default in-process
// minter (`internal/instinct.builtin_minter`) so this interface is
// only used when a user wires up an LLM-backed candidate generator
// (v0.6+ experimental, e.g. SkillX / Anything2Skill adapters).
//
// Why the split from MemoryBackend: memory backends (mem0, Graphiti)
// are good at storage and retrieval, not at the bough-specific
// concern of distilling a per-worktree trace into a behavioural rule.
// Forcing every memory backend to implement Mint would push bough's
// trace-handling logic into every plugin author's lap; isolating it
// here keeps MemoryBackend authors focused on persistence.
//
// Versioning: bumping ProtocolVersion in plugins/instinct/api/handshake.go
// is what gates a backwards-incompatible change here. v0.6 may add
// an InstinctScorer or InstinctMerger RPC alongside Mint.

syntax = "proto3";

package bough.instinct.v1;

option go_package = "github.com/ikeikeikeike/bough/plugins/instinct/api/proto;pb";

// InstinctMinter turns observed traces (session log lines, test
// failures, lint output, commit messages, post-create hook output)
// into one or more InstinctCandidate rows that the host's poisoning
// guard then routes through approval before they become active.
service InstinctMinter {
  // Mint inspects the bundle of traces in TraceBundles and returns
  // zero or more candidates. Plugins should be lenient: returning an
  // empty Candidates list is fine when the bundle does not carry
  // enough signal. The host is responsible for dedupe (sha256 over
  // rule + scope) and for budget/poisoning enforcement; minters
  // should focus on quality of extraction, not on whether a
  // candidate "deserves" to be stored.
  rpc Mint(MintRequest) returns (MintResponse);
}

// Scope addresses one of three lifetime tiers, mirroring
// plugins/memory/api/proto.Scope. Duplicated here so the instinct
// plugin contract is independently complete.
message Scope {
  string level = 1;        // "worktree" | "repo" | "global"
  string worktree_id = 2;
  string repo_name = 3;
}

// TraceBundle is a normalised observation passed from the host's
// observer (stdin ingest in v0.5 primary path, jsonl tail in opt-in
// beta) after redaction has stripped PII/secret patterns.
message TraceBundle {
  string id = 1;
  string source = 2;       // stdin | session_log | test_failure | lint_output | commit_message | post_create_hook
  Scope scope = 3;
  int64 captured_at = 4;   // unix epoch seconds
  string content = 5;      // redacted raw text
  string evidence_ref = 6; // session id, commit hash, test id, etc.
  string source_event_id = 7; // idempotency token for retry-safe ingest
}

// InstinctCandidate is the unit a minter produces and the host
// considers for approval. Confidence is the minter's best estimate
// based on the candidate's source; the host clamps it to
// `instinct.confidence.sources.<source>` if the value is higher than
// the configured ceiling.
message InstinctCandidate {
  string id = 1;
  string rule = 2;
  string why = 3;
  string how_to_apply = 4;
  repeated string domain = 5;
  Scope scope = 6;
  string source = 7;
  double confidence = 8;
  string state = 9;        // always "candidate" out of Mint
  repeated string source_traces = 10;
  int64 created_at = 11;
  string dedupe_key = 12;  // sha256(normalize(rule + scope))
}

message MintRequest {
  repeated TraceBundle trace_bundles = 1;
  Scope scope = 2;
}
message MintResponse {
  string error = 1;
  repeated InstinctCandidate candidates = 2;
}
