# GoReleaser config for bough.
# Builds the host + the five bundled engine plugins
# (mysql / postgres / redis / elasticsearch / compose) together so
# every release archive is self-contained: an operator who downloads
# `bough_v0.4.0_darwin_arm64.tar.gz` already has every
# `bough-plugin-<kind>` on PATH without a second install step.
# (External plugin authors keep distributing their own
# `bough-plugin-<kind>` binaries separately.)
#
# Docs: https://goreleaser.com/customization/

version: 2

project_name: bough

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: bough
    main: ./cmd/bough
    binary: bough
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0

  - id: bough-plugin-mysql
    main: ./cmd/bough-plugin-mysql
    binary: bough-plugin-mysql
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
    env:
      - CGO_ENABLED=0

  - id: bough-plugin-postgres
    main: ./cmd/bough-plugin-postgres
    binary: bough-plugin-postgres
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
    env:
      - CGO_ENABLED=0

  - id: bough-plugin-redis
    main: ./cmd/bough-plugin-redis
    binary: bough-plugin-redis
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
    env:
      - CGO_ENABLED=0

  - id: bough-plugin-elasticsearch
    main: ./cmd/bough-plugin-elasticsearch
    binary: bough-plugin-elasticsearch
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
    env:
      - CGO_ENABLED=0

  - id: bough-plugin-compose
    main: ./cmd/bough-plugin-compose
    binary: bough-plugin-compose
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
    env:
      - CGO_ENABLED=0

  # v0.5-v0.8 memory subsystem + MCP server: deleted on the v0.9
  # reset (= ECC verbatim port). claude --print subprocess does the
  # LLM work, so neither bough-plugin-memory-{sqlite,mem0} nor
  # bough-mcp-server need to ship in the v0.9 archive. Operators
  # who depend on those surfaces should stay on v0.8.1.

archives:
  - id: default
    ids:
      - bough
      - bough-plugin-mysql
      - bough-plugin-postgres
      - bough-plugin-redis
      - bough-plugin-elasticsearch
      - bough-plugin-compose
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: 'checksums.txt'

# v0.6 supply chain (round 4 priority A9): Sigstore cosign keyless
# signing of the release artifacts via GitHub Actions OIDC. The
# release workflow exports COSIGN_EXPERIMENTAL=1 and runs with
# id-token: write so cosign can retrieve the Fulcio cert without a
# pre-provisioned private key.
#
# Skipped on snapshot builds — local `goreleaser release --snapshot`
# does not have the OIDC context.
signs:
  - id: cosign-keyless
    cmd: cosign
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: archive
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    output: true
    env:
      - COSIGN_EXPERIMENTAL=1
    # GoReleaser v2 dropped `signs.if`; snapshot-only sign skips
    # happen through the CLI's `--skip=sign` flag instead. Tag
    # releases sign unconditionally, which is what we want.

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^test:'
      - '^ci:'
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: threecorp
    name: bough
  draft: false
  prerelease: auto
  name_template: 'v{{.Version}}'
